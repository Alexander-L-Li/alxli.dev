  <rect x="366" y="55" width="58" height="42" rx="1" fill="#1c1c1c"/>
  <rect x="435" y="62" width="42" height="35" rx="1" fill="#1c1c1c"/>
  <rect x="490" y="57" width="55" height="28" rx="1" fill="#1a1a1a"/>
  <rect x="558" y="55" width="64" height="52" rx="1" fill="#1c1c1c"/>
  <rect x="638" y="60" width="48" height="38" rx="1" fill="#1a1a1a"/>
  <rect x="700" y="65" width="55" height="32" rx="1" fill="#1a1a1a"/>
  <rect x="308" y="155" width="42" height="30" rx="1" fill="#1c1c1c"/>
  <rect x="362" y="162" width="52" height="26" rx="1" fill="#1a1a1a"/>
  <rect x="540" y="148" width="58" height="42" rx="1" fill="#1c1c1c"/>
  <rect x="618" y="155" width="48" height="36" rx="1" fill="#1a1a1a"/>
  <rect x="690" y="150" width="52" height="32" rx="1" fill="#1a1a1a"/>
  <rect x="308" y="248" width="46" height="36" rx="1" fill="#1c1c1c"/>
  <rect x="364" y="255" width="54" height="30" rx="1" fill="#1a1a1a"/>
  <rect x="472" y="246" width="46" height="36" rx="1" fill="#1a1a1a"/>
  <rect x="558" y="238" width="52" height="42" rx="1" fill="#1c1c1c"/>
  <rect x="658" y="250" width="56" height="32" rx="1" fill="#1a1a1a"/>
  <rect x="728" y="242" width="46" height="42" rx="1" fill="#1a1a1a"/>

  <!-- Major roads (horizontal) -->
  <rect x="300" y="140" width="500" height="7" fill="#373737"/>
  <rect x="300" y="228" width="500" height="6" fill="#373737"/>
  <rect x="300" y="310" width="500" height="6" fill="#373737"/>

  <!-- Major roads (vertical) -->
  <rect x="416" y="48" width="7" height="402" fill="#373737"/>
  <rect x="554" y="48" width="6" height="402" fill="#373737"/>
  <rect x="676" y="48" width="5" height="402" fill="#373737"/>

  <!-- Minor roads -->
  <rect x="300" y="108" width="500" height="2.5" fill="#2d2d2d"/>
  <rect x="300" y="186" width="500" height="2.5" fill="#2d2d2d"/>
  <rect x="300" y="268" width="500" height="2.5" fill="#2d2d2d"/>
  <rect x="486" y="48" width="2.5" height="402" fill="#2d2d2d"/>
  <rect x="626" y="48" width="2.5" height="402" fill="#2d2d2d"/>
  <rect x="748" y="48" width="2.5" height="402" fill="#2d2d2d"/>

  <!-- Highway -->
  <path d="M300,356 C400,346 520,360 620,352 S740,358 800,350" stroke="#3c3c3c" stroke-width="8" fill="none"/>

  <!-- Water (bottom) -->
  <path d="M480,400 Q560,388 660,402 Q730,410 800,400 L800,450 L480,450 Z" fill="#080808"/>

  <!-- ─── ROUTE LINE (Google Maps blue, road-following) ─────────────────── -->
  <!-- Route shadow -->
  <path d="M356,248 C360,230 366,205 382,165 L490,162 Q530,165 560,228 L560,228 C582,264 614,234 700,188 C722,176 744,176 760,232 Q768,265 758,298 C744,334 706,347 676,348 L560,342 C502,340 462,326 424,295 C400,277 375,261 356,248 Z"
        stroke="#1a56db" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <!-- Main route -->
  <path d="M356,248 C360,230 366,205 382,165 L490,162 Q530,165 560,228 L560,228 C582,264 614,234 700,188 C722,176 744,176 760,232 Q768,265 758,298 C744,334 706,347 676,348 L560,342 C502,340 462,326 424,295 C400,277 375,261 356,248 Z"
        stroke="#4285F4" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Dim pins from other days -->
  <circle cx="452" cy="310" r="7" fill="#3b82f6" opacity="0.25"/>
  <circle cx="600" cy="268" r="7" fill="#3b82f6" opacity="0.2"/>
  <circle cx="500" cy="96" r="7" fill="#f97316" opacity="0.2"/>

  <!-- ─── HOTEL MARKER (round-trip origin/destination, amber) ──────────── -->
  <circle cx="356" cy="248" r="13" fill="#f59e0b" stroke="white" stroke-width="2.5"/>
  <text x="356" y="253.5" text-anchor="middle" fill="white" font-family="ui-sans-serif,Arial,sans-serif" font-size="12" font-weight="bold">⌂</text>

  <!-- ─── PIN MARKERS ────────────────────────────────────────────────────── -->
  <!-- Pin 1 (selected — larger white ring) -->
  <circle cx="382" cy="165" r="14" fill="#ef4444" stroke="white" stroke-width="2.5"/>
  <text x="382" y="170" text-anchor="middle" fill="white" font-family="ui-sans-serif,Arial,sans-serif" font-size="10" font-weight="bold">1</text>

  <!-- Pin 2 -->
  <circle cx="560" cy="228" r="11" fill="#f97316" stroke="#111111" stroke-width="1.5"/>
  <text x="560" y="232.5" text-anchor="middle" fill="white" font-family="ui-sans-serif,Arial,sans-serif" font-size="10" font-weight="bold">2</text>

  <!-- Pin 3 -->
  <circle cx="700" cy="188" r="11" fill="#eab308" stroke="#111111" stroke-width="1.5"/>
  <text x="700" y="192.5" text-anchor="middle" fill="white" font-family="ui-sans-serif,Arial,sans-serif" font-size="10" font-weight="bold">3</text>

  <!-- Pin 4 -->
  <circle cx="760" cy="298" r="11" fill="#22c55e" stroke="#111111" stroke-width="1.5"/>
  <text x="760" y="302.5" text-anchor="middle" fill="white" font-family="ui-sans-serif,Arial,sans-serif" font-size="10" font-weight="bold">4</text>

  <!-- Info window popup on pin 1 -->
  <rect x="390" y="118" width="148" height="60" rx="6" fill="white" filter="drop-shadow(0 2px 8px rgba(0,0,0,0.4))"/>
  <polygon points="394,178 400,192 406,178" fill="white"/>
  <rect x="399" y="125" width="6" height="6" rx="3" fill="#ef4444"/>
  <text x="410" y="132" fill="#111827" font-family="ui-sans-serif,Arial,sans-serif" font-size="10" font-weight="600">Senso-ji Temple</text>
  <text x="399" y="144" fill="#6b7280" font-family="ui-sans-serif,Arial,sans-serif" font-size="8.5">Landmark · Asakusa, Tokyo</text>
  <text x="399" y="156" fill="#9ca3af" font-family="ui-sans-serif,Arial,sans-serif" font-size="8">Day 1 · Stop 1</text>
  <!-- Edit/Delete micro-buttons -->
  <text x="399" y="170" fill="#6b7280" font-family="ui-sans-serif,Arial,sans-serif" font-size="8">✎ Edit</text>
  <text x="427" y="170" fill="#ef4444" font-family="ui-sans-serif,Arial,sans-serif" font-size="8">🗑 Delete</text>
</svg>
