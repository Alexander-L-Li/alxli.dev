<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <!-- App background (zinc-950) -->
  <rect width="800" height="450" fill="#09090b"/>

  <!-- ─── TOP BAR ────────────────────────────────────────────────────────── -->
  <rect width="800" height="48" fill="#09090b"/>
  <line x1="0" y1="48" x2="800" y2="48" stroke="#27272a" stroke-width="1" opacity="0.8"/>

  <!-- Back button -->
  <text x="14" y="30" fill="#71717a" font-family="ui-sans-serif,Arial,sans-serif" font-size="11">← MapHub</text>
  <line x1="72" y1="15" x2="72" y2="33" stroke="#27272a" stroke-width="1"/>

  <!-- Trip name -->
  <text x="80" y="30" fill="white" font-family="ui-sans-serif,Arial,sans-serif" font-size="13" font-weight="600">Japan 2025</text>

  <!-- Day tabs -->
  <rect x="150" y="12" width="58" height="24" rx="5" fill="#ef444422"/>
  <circle cx="162" cy="24" r="3" fill="#ef4444"/>
  <text x="168" y="29" fill="#ef4444" font-family="ui-sans-serif,Arial,sans-serif" font-size="10" font-weight="600">Day 1</text>
  <text x="197" y="29" fill="#ef4444" font-family="ui-sans-serif,Arial,sans-serif" font-size="9" opacity="0.45">4</text>

  <circle cx="218" cy="24" r="3" fill="#f97316"/>
  <text x="224" y="29" fill="#52525b" font-family="ui-sans-serif,Arial,sans-serif" font-size="10">Day 2</text>
  <text x="253" y="29" fill="#52525b" font-family="ui-sans-serif,Arial,sans-serif" font-size="9" opacity="0.4">3</text>

  <circle cx="272" cy="24" r="3" fill="#eab308"/>
  <text x="278" y="29" fill="#52525b" font-family="ui-sans-serif,Arial,sans-serif" font-size="10">Day 3</text>
  <text x="307" y="29" fill="#52525b" font-family="ui-sans-serif,Arial,sans-serif" font-size="9" opacity="0.4">2</text>

  <!-- Edit badge -->
  <rect x="666" y="14" width="44" height="20" rx="4" fill="#18181b" stroke="#27272a" stroke-width="1"/>
  <text x="688" y="28" text-anchor="middle" fill="#71717a" font-family="ui-sans-serif,Arial,sans-serif" font-size="9">edit</text>

  <!-- Right icon group: sun, share, settings -->
  <!-- Sun -->
  <circle cx="724" cy="24" r="4.5" fill="none" stroke="#71717a" stroke-width="1.5"/>
  <g stroke="#71717a" stroke-width="1.5">
    <line x1="724" y1="15.5" x2="724" y2="13.5"/>
    <line x1="724" y1="32.5" x2="724" y2="34.5"/>
    <line x1="732.5" y1="24" x2="734.5" y2="24"/>
    <line x1="715.5" y1="24" x2="713.5" y2="24"/>
    <line x1="730.2" y1="17.8" x2="731.6" y2="16.4"/>
    <line x1="717.8" y1="30.2" x2="716.4" y2="31.6"/>
    <line x1="730.2" y1="30.2" x2="731.6" y2="31.6"/>
    <line x1="717.8" y1="17.8" x2="716.4" y2="16.4"/>
  </g>
  <!-- Share dots -->
  <circle cx="750" cy="17" r="2.5" fill="none" stroke="#71717a" stroke-width="1.5"/>
  <circle cx="758" cy="24" r="2.5" fill="none" stroke="#71717a" stroke-width="1.5"/>
  <circle cx="750" cy="31" r="2.5" fill="none" stroke="#71717a" stroke-width="1.5"/>
  <line x1="752.3" y1="18.2" x2="755.7" y2="22.8" stroke="#71717a" stroke-width="1.5"/>
  <line x1="752.3" y1="29.8" x2="755.7" y2="25.2" stroke="#71717a" stroke-width="1.5"/>
  <!-- Settings gear -->
  <circle cx="782" cy="24" r="4" fill="none" stroke="#71717a" stroke-width="1.5"/>
  <circle cx="782" cy="24" r="1.5" fill="#71717a"/>

