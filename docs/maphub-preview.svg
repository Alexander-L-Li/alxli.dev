  <rect x="10" y="410" width="133" height="28" rx="6" fill="#27272a" stroke="#3f3f46" stroke-width="0.5"/>
  <text x="76.5" y="429" text-anchor="middle" fill="#d4d4d8" font-family="ui-sans-serif,Arial,sans-serif" font-size="10" font-weight="500">Optimize Route</text>
  <!-- Add Pin -->
  <rect x="151" y="410" width="139" height="28" rx="6" fill="#27272a" stroke="#3f3f46" stroke-width="0.5"/>
  <text x="220.5" y="429" text-anchor="middle" fill="white" font-family="ui-sans-serif,Arial,sans-serif" font-size="10" font-weight="500">+ Add Pin</text>

  <!-- Sidebar toggle nub -->
  <rect x="299" y="214" width="12" height="26" rx="0 4 4 0" fill="#18181b" stroke="#27272a" stroke-width="1"/>
  <text x="305" y="230" text-anchor="middle" fill="#52525b" font-family="Arial,sans-serif" font-size="9">‹</text>

