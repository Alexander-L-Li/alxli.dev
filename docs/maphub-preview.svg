  <line x1="300" y1="48" x2="300" y2="450" stroke="#27272a" stroke-width="1" opacity="0.6"/>

  <!-- Search bar -->
  <rect x="0" y="48" width="300" height="48" fill="#18181b"/>
  <line x1="0" y1="96" x2="300" y2="96" stroke="#27272a" stroke-width="1" opacity="0.6"/>
  <rect x="10" y="58" width="280" height="28" rx="7" fill="#27272a" stroke="#3f3f46" stroke-width="0.5"/>
  <!-- Search icon -->
  <circle cx="27" cy="72" r="4.5" fill="none" stroke="#52525b" stroke-width="1.5"/>
  <line x1="30.2" y1="75.2" x2="33" y2="78" stroke="#52525b" stroke-width="1.5"/>
  <rect x="40" y="69" width="88" height="6" rx="2" fill="#52525b" opacity="0.4"/>

  <!-- Day header -->
  <rect x="0" y="96" width="300" height="48" fill="#18181b"/>
  <line x1="0" y1="144" x2="300" y2="144" stroke="#27272a" stroke-width="1" opacity="0.6"/>
  <circle cx="18" cy="109" r="3.5" fill="#ef4444"/>
  <text x="26" y="114" fill="#d4d4d8" font-family="ui-sans-serif,Arial,sans-serif" font-size="11" font-weight="600">Day 1</text>
  <text x="72" y="114" fill="#52525b" font-family="ui-sans-serif,Arial,sans-serif" font-size="11">· 4 stops</text>
  <!-- Stay row (amber hotel) -->
  <text x="14" y="133" fill="#fbbf24" font-family="ui-sans-serif,Arial,sans-serif" font-size="10">⌂</text>
  <rect x="26" y="126" width="120" height="6" rx="2" fill="#f59e0b" opacity="0.55"/>

  <!-- Pin list items -->
  <!-- Pin 1 selected -->
  <rect x="0" y="144" width="300" height="46" fill="#27272a"/>
  <circle cx="22" cy="167" r="10" fill="#ef4444"/>
  <text x="22" y="171.5" text-anchor="middle" fill="white" font-family="ui-sans-serif,Arial,sans-serif" font-size="9" font-weight="bold">1</text>
  <rect x="38" y="154" width="115" height="7" rx="2.5" fill="white" opacity="0.9"/>
  <rect x="38" y="165" width="82" height="5" rx="2" fill="#71717a" opacity="0.55"/>
  <rect x="38" y="174" width="58" height="4" rx="2" fill="#3f3f46" opacity="0.6"/>
  <line x1="0" y1="190" x2="300" y2="190" stroke="#27272a" stroke-width="0.5" opacity="0.4"/>

  <!-- Pin 2 -->
  <rect x="0" y="190" width="300" height="44" fill="#18181b"/>
  <circle cx="22" cy="212" r="10" fill="#f97316"/>
  <text x="22" y="216.5" text-anchor="middle" fill="white" font-family="ui-sans-serif,Arial,sans-serif" font-size="9" font-weight="bold">2</text>
  <rect x="38" y="200" width="98" height="7" rx="2.5" fill="white" opacity="0.7"/>
  <rect x="38" y="211" width="70" height="5" rx="2" fill="#71717a" opacity="0.42"/>
  <line x1="0" y1="234" x2="300" y2="234" stroke="#27272a" stroke-width="0.5" opacity="0.4"/>

  <!-- Pin 3 -->
  <rect x="0" y="234" width="300" height="44" fill="#18181b"/>
  <circle cx="22" cy="256" r="10" fill="#eab308"/>
  <text x="22" y="260.5" text-anchor="middle" fill="white" font-family="ui-sans-serif,Arial,sans-serif" font-size="9" font-weight="bold">3</text>
  <rect x="38" y="244" width="108" height="7" rx="2.5" fill="white" opacity="0.55"/>
  <rect x="38" y="255" width="75" height="5" rx="2" fill="#71717a" opacity="0.35"/>
  <line x1="0" y1="278" x2="300" y2="278" stroke="#27272a" stroke-width="0.5" opacity="0.4"/>

  <!-- Pin 4 -->
  <rect x="0" y="278" width="300" height="44" fill="#18181b"/>
  <circle cx="22" cy="300" r="10" fill="#22c55e"/>
  <text x="22" y="304.5" text-anchor="middle" fill="white" font-family="ui-sans-serif,Arial,sans-serif" font-size="9" font-weight="bold">4</text>
  <rect x="38" y="288" width="90" height="7" rx="2.5" fill="white" opacity="0.45"/>
  <rect x="38" y="299" width="65" height="5" rx="2" fill="#71717a" opacity="0.28"/>

